<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Manza Hoops Daily Briefs</title>
<style>
  :root{
    --bg:#0f1115; --panel:#161a21; --panel2:#1d222b; --line:#272e39;
    --text:#e8ecf3; --muted:#8b95a6; --accent:#ff6b1a; --accent2:#ffb020;
    --chip:#232a35; --good:#2fbf71; --warn:#ffb020;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--text);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  a{color:var(--accent2);text-decoration:none} a:hover{text-decoration:underline}
  .app{display:grid;grid-template-columns:320px 1fr;height:100vh;transition:grid-template-columns .2s ease}
  .app.sidebar-collapsed{grid-template-columns:0px 1fr}

  /* Sidebar / cabinet */
  .cabinet{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;overflow:hidden;transition:border-width .2s}
  .app.sidebar-collapsed .cabinet{border-right-width:0}
  .brand{padding:16px 18px 12px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:8px}
  .brand-text{flex:1;min-width:0}
  .brand h1{margin:0;font-size:16px;letter-spacing:.2px}
  .brand .sub{color:var(--muted);font-size:12px;margin-top:3px}
  .sidebar-toggle{position:fixed;top:14px;left:12px;z-index:40;background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:6px 9px;font-size:15px;cursor:pointer;line-height:1;transition:left .2s ease}
  .sidebar-toggle:hover{color:var(--text);border-color:var(--accent)}
  .app:not(.sidebar-collapsed) .sidebar-toggle{left:286px}
  .toolbar{padding:10px 14px;display:flex;gap:8px;border-bottom:1px solid var(--line)}
  .toolbar input{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:7px 10px;font-size:13px;outline:none}
  .toolbar input:focus{border-color:var(--accent)}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:7px 10px;font-size:13px;cursor:pointer;white-space:nowrap}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:linear-gradient(180deg,var(--accent),#e85d10);border-color:transparent;color:#fff;font-weight:600}
  .tree{overflow:auto;padding:8px 8px 40px;min-height:0;flex:1}
  .season{margin:6px 4px}
  .season>.hdr{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 8px;border-radius:8px;font-weight:700;color:#fff}
  .season>.hdr:hover{background:var(--panel2)}
  .season .count{color:var(--muted);font-weight:500;font-size:12px;margin-left:auto}
  .month{margin:2px 0 2px 10px}
  .month>.hdr{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 8px;border-radius:7px;color:var(--muted);font-size:13px;font-weight:600}
  .month>.hdr:hover{background:var(--panel2);color:var(--text)}
  .day{display:flex;align-items:center;gap:8px;margin:2px 0 2px 22px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:13px}
  .day:hover{background:var(--panel2)}
  .day.active{background:var(--chip);outline:1px solid var(--accent)}
  .day .d{font-weight:600}
  .day .dow{color:var(--muted);font-size:12px}
  .caret{display:inline-block;width:12px;transition:transform .15s;color:var(--muted)}
  .collapsed .caret{transform:rotate(-90deg)}
  .collapsed .body{display:none}
  .chip{font-size:10.5px;padding:2px 7px;border-radius:999px;background:var(--chip);border:1px solid var(--line);color:var(--accent2);white-space:nowrap;margin-left:auto}

  /* Main */
  .main{min-width:0;display:flex;flex-direction:column;min-height:0}
  .mhead{padding:18px 26px 12px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .app.sidebar-collapsed .mhead{padding-left:54px}
  .mhead h2{margin:0;font-size:20px}
  .mhead .meta{color:var(--muted);font-size:13px;margin-top:4px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .mhead .spacer{flex:1}
  .actions{display:flex;gap:8px;align-items:center}
  .tabs{display:flex;gap:4px;padding:10px 26px 0}
  .tab{padding:8px 14px;border-radius:8px 8px 0 0;cursor:pointer;color:var(--muted);font-size:14px;border:1px solid transparent;border-bottom:none}
  .tab.active{color:var(--text);background:var(--panel);border-color:var(--line)}
  .content{overflow:auto;padding:22px 30px 60px;flex:1;min-height:0}
  .doc{max-width:820px}
  .doc h1{font-size:24px;margin:.2em 0 .4em} .doc h2{font-size:18px;margin:1.3em 0 .5em;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .doc h3{font-size:15px;color:var(--accent2);margin:1em 0 .4em;letter-spacing:.2px}
  .doc ul{padding-left:20px;margin:.4em 0} .doc li{margin:.28em 0}
  .doc hr{border:none;border-top:1px solid var(--line);margin:1.4em 0}
  .doc code{background:var(--panel2);padding:1px 6px;border-radius:5px;font-size:13px}
  .doc blockquote{border-left:3px solid var(--accent);margin:.6em 0;padding:.2em 14px;color:var(--muted)}
  .doc strong{color:#fff}
  .scripttext{max-width:820px;white-space:pre-wrap;font-size:17px;line-height:1.75}
  .blank-wrap{max-width:820px;display:flex;flex-direction:column;gap:12px;height:calc(100vh - 200px)}
  .blank-wrap textarea{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:16px;font-size:16px;line-height:1.7;resize:none;outline:none;font-family:inherit}
  .blank-wrap textarea:focus{border-color:var(--accent)}
  .blank-wrap textarea::placeholder{color:var(--muted)}
  .blank-wrap .blank-actions{display:flex;gap:10px;align-items:center}
  .blank-wrap .blank-hint{color:var(--muted);font-size:12px;margin-left:4px}
  .empty{color:var(--muted);text-align:center;margin-top:16vh}
  .empty .big{font-size:44px;margin-bottom:10px}

  /* Teleprompter */
  .tp{position:fixed;inset:0;background:#000;z-index:50;display:none;flex-direction:column}
  .tp.open{display:flex}
  .tp-scroll{flex:1;overflow:hidden;position:relative}
  .tp-inner{position:absolute;left:0;right:0;padding:60vh 8vw;text-align:center;color:#fff;font-weight:700;letter-spacing:.3px;will-change:transform}
  .tp-inner p{margin:0 0 .7em}
  .tp-guide{position:absolute;left:0;right:0;top:38%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.5}
  .tp-ctrl{background:#0b0d10;border-top:1px solid #222;padding:12px 18px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;justify-content:center}
  .tp-ctrl .grp{display:flex;gap:9px;align-items:center;font-size:13px;color:var(--muted)}
  .tp-ctrl input[type=range]{width:150px;accent-color:var(--accent)}
  .tp-ctrl .btn{min-width:44px;text-align:center}
  .tp-ctrl .big{font-size:16px;font-weight:700}
  .toggle{cursor:pointer;user-select:none;padding:7px 12px;border-radius:8px;border:1px solid var(--line);color:var(--muted)}
  .toggle.on{color:#fff;border-color:var(--accent);background:rgba(255,107,26,.15)}
  .hint{position:absolute;top:14px;left:0;right:0;text-align:center;color:#555;font-size:12px}

  /* YouTube modal */
  .yt-modal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:60;display:none;align-items:center;justify-content:center;padding:20px}
  .yt-modal.open{display:flex}
  .yt-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:100%;max-width:660px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
  .yt-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);font-weight:700;font-size:15px}
  .yt-body{overflow:auto;padding:18px;display:flex;flex-direction:column;gap:16px}
  .tab-tp-bar{padding:16px 26px 24px;display:flex;align-items:center;gap:14px;border-top:1px solid var(--line);margin-top:8px}
  .tab-tp-hint{color:var(--muted);font-size:12px}
  .yt-section{}
  .yt-label{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:10px}
  .yt-label button{font-size:11px;padding:2px 9px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);color:var(--text);cursor:pointer;white-space:nowrap}
  .yt-label button:hover{border-color:var(--accent)}
  .yt-label button.copied{color:var(--good);border-color:var(--good)}
  .yt-field{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:11px 13px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;color:var(--text);outline:none;min-height:1.6em}
  .yt-field[contenteditable=true]:focus{border-color:var(--accent2)}
  .yt-field[contenteditable=true]:hover:not(:focus){border-color:var(--muted)}
  .yt-titles{display:flex;flex-direction:column;gap:6px}
  .yt-title-row{display:flex;align-items:stretch;gap:8px}
  .yt-title-row .yt-field{flex:1;cursor:pointer;user-select:none}
  .yt-title-row .yt-field:hover:not([contenteditable=true]){border-color:var(--accent)}
  .yt-title-row .yt-field.copied{border-color:var(--good)}
  .yt-title-row .yt-field[contenteditable=true]{cursor:text;user-select:text}
  .yt-add-title{background:none;border:1px dashed var(--line);border-radius:8px;color:var(--muted);font-size:12px;padding:7px 12px;cursor:pointer;text-align:left;width:100%}
  .yt-add-title:hover{border-color:var(--accent);color:var(--text)}
  .yt-hint{font-size:10px;color:var(--muted);margin-top:3px;margin-left:2px}

  /* ─────────────────────────────────────────
     OVERLAY TAB
  ───────────────────────────────────────── */
  .ov-wrap{max-width:820px;display:flex;flex-direction:column;gap:20px}

  /* topic toggle pills */
  .ov-topics{display:flex;gap:7px;flex-wrap:wrap}
  .ov-topic{background:var(--chip);border:1px solid var(--line);color:var(--muted);border-radius:20px;padding:6px 14px;font-size:12.5px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .12s}
  .ov-topic:hover{border-color:var(--accent);color:var(--text)}
  .ov-topic.active{background:#e8000d;border-color:#e8000d;color:#fff}
  .ov-topic.active.gold{background:#f5a623;border-color:#f5a623}
  .ov-topic.active.blue{background:#1565c0;border-color:#1565c0}

  /* banner preview */
  .ov-preview-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-family:Arial,sans-serif}
  .ov-preview-wrap{border-radius:6px;box-shadow:0 8px 36px rgba(0,0,0,.55);overflow:visible}
  .ov-banner{display:flex;align-items:stretch;background:var(--ov-bg,#0d0d0d);border-left:6px solid var(--ov-clr,#e8000d);min-height:82px}
  .ov-body{flex:1;padding:14px 20px;display:flex;flex-direction:column;gap:5px;justify-content:center}
  .ov-tag-row{display:flex;align-items:center;gap:9px}
  .ov-tag{background:var(--ov-clr,#e8000d);color:#fff;font-size:10px;font-weight:900;letter-spacing:2.5px;padding:2px 8px;text-transform:uppercase;font-family:Arial,sans-serif}
  .ov-headline-el{color:#fff;font:900 22px/1.1 "Arial Black",Impact,Arial,sans-serif;text-transform:uppercase;letter-spacing:-.3px;word-break:break-word}
  .ov-sub-el{color:#aaa;font:13px/1.4 Arial,sans-serif;margin-top:2px}
  .ov-brand{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 16px;border-left:1px solid #222;flex-shrink:0;gap:5px;min-width:68px}
  .ov-brand-img{width:38px;height:38px;object-fit:contain;border-radius:4px;display:none}
  .ov-brand-icon{font-size:22px;line-height:1}
  .ov-brand-name{color:#555;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;font-family:Arial,sans-serif;text-align:center;line-height:1.4}
  /* bottom bar (static) */
  .ov-ticker{background:var(--ov-clr,#e8000d);height:34px;display:flex;align-items:center;justify-content:center;padding:0 24px}
  .ov-ticker-text{color:#fff;font:700 12px/1 Arial,sans-serif;letter-spacing:1.2px;text-transform:uppercase;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .ov-sep{color:rgba(255,255,255,.4)}
  /* bg image overlay */
  .ov-banner-bg{position:absolute;inset:0;object-fit:cover;opacity:.18;pointer-events:none;display:none}
  .ov-preview-wrap{position:relative}

  /* control rows */
  .ov-ctrls{display:flex;flex-direction:column;gap:12px}
  .ov-section-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-family:Arial,sans-serif;margin-bottom:4px}
  .ov-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .ov-row-label{color:var(--muted);font-size:12px;min-width:82px;flex-shrink:0}
  .ov-input{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:7px 11px;font-size:13px;flex:1;min-width:140px;font-family:inherit;outline:none}
  .ov-input:focus{border-color:var(--accent)}
  .ov-apply-btn{background:#e8000d;color:#fff;border:none;border-radius:7px;padding:7px 16px;font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;font-family:Arial,sans-serif;flex-shrink:0}
  .ov-apply-btn:hover{background:#c40010}
  /* theme buttons */
  .ov-theme-btn{background:var(--chip);border:1px solid var(--line);color:var(--muted);border-radius:7px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .12s}
  .ov-theme-btn:hover{border-color:var(--accent);color:var(--text)}
  .ov-theme-btn[data-theme="red"].active{background:#e8000d;border-color:#e8000d;color:#fff}
  .ov-theme-btn[data-theme="gold"].active{background:#f5a623;border-color:#f5a623;color:#fff}
  .ov-theme-btn[data-theme="blue"].active{background:#1565c0;border-color:#1565c0;color:#fff}
  /* range */
  .ov-range{accent-color:var(--accent);width:130px;cursor:pointer}
  .ov-range-val{color:var(--text);font-size:12px;min-width:24px}
  /* animate toggle */
  .ov-toggle{background:var(--chip);border:1px solid var(--line);color:var(--muted);border-radius:7px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit}
  .ov-toggle.on{background:rgba(46,191,113,.15);border-color:var(--good);color:var(--good)}
  /* upload areas */
  .ov-upload{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px dashed var(--line);border-radius:8px;padding:8px 13px;cursor:pointer;font-size:12px;color:var(--muted);transition:border-color .12s}
  .ov-upload:hover{border-color:var(--accent);color:var(--text)}
  .ov-upload input[type=file]{display:none}
  .ov-thumb{width:30px;height:30px;border-radius:4px;object-fit:contain;display:none}
  .ov-clear-img{background:none;border:1px solid var(--line);color:var(--muted);border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer;display:none}
  .ov-clear-img:hover{border-color:var(--accent);color:var(--text)}

  /* drag photo */
  .ov-drag-photo{position:absolute;cursor:move;z-index:10;object-fit:contain;user-select:none;pointer-events:auto;border:2px solid transparent;box-sizing:border-box;transition:border-color .1s}
  .ov-drag-photo:hover{border-color:rgba(255,255,255,.5)}
  .ov-drag-photo .ov-ph-resize{position:absolute;bottom:-6px;right:-6px;width:14px;height:14px;background:#fff;border-radius:50%;cursor:se-resize;pointer-events:auto}

  /* download buttons */
  .ov-dl-btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s}
  .ov-dl-btn:hover{border-color:var(--good);color:var(--good)}
  .ov-dl-btn.rec{border-color:#e8000d;color:#e8000d}
  .ov-dl-btn.rec:hover{background:#e8000d;color:#fff}

  /* banner — natural width preview; html2canvas scales UP to 3840px on export */
  .ov-banner-scaler{width:100%;overflow:hidden}
  .ov-banner-inner-scale{width:100%;transform-origin:top left}
  .ov-banner{display:flex;align-items:stretch;background:var(--ov-bg,#0d0d0d);border-left:none;min-height:80px;width:100%}
  /* left accent stripe */
  .ov-side{width:7px;background:var(--ov-clr,#e8000d);flex-shrink:0}
  /* logo zone — always visible, fixed width reserved for logo placement */
  .ov-logo-slot{display:flex;align-items:center;justify-content:center;width:100px;flex-shrink:0;padding:8px 10px;box-sizing:border-box}
  .ov-logo-slot img{max-width:80px;max-height:70px;object-fit:contain;border-radius:3px;display:none}
  .ov-logo-slot.has-logo img{display:block}
  /* banner body — preview font sizes (export multiplies ~4-5x to 4K) */
  .ov-headline-el{color:#fff;font:900 38px/1.1 "Arial Black",Impact,Arial,sans-serif;text-transform:uppercase;letter-spacing:-.5px;word-break:break-word}
  .ov-sub-el{color:#bbb;font:17px/1.4 Arial,sans-serif;margin-top:2px}
  .ov-body{flex:1;padding:12px 22px 12px 14px;display:flex;flex-direction:column;gap:4px;justify-content:center}
  /* bottom bar — full width, bold and readable */
  .ov-ticker{background:var(--ov-clr,#e8000d);height:36px;display:flex;align-items:center;justify-content:center;padding:0 22px;width:100%;box-sizing:border-box}
  .ov-ticker-text{color:#fff;font:700 13px/1 Arial,sans-serif;letter-spacing:2.5px;text-transform:uppercase;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
  /* draggable photo wrapper */
  .ov-photo-wrap{position:absolute;cursor:move;z-index:10;user-select:none}
  .ov-photo-wrap img{width:100%;height:auto;display:block;pointer-events:none}
  .ov-photo-wrap:hover .ov-ph-handle{opacity:1}
  .ov-ph-handle{position:absolute;bottom:-10px;right:-10px;width:24px;height:24px;background:#fff;border-radius:50%;cursor:se-resize;border:2px solid rgba(0,0,0,.35);opacity:0;transition:opacity .15s}
  /* photo upload list */
  .ov-photo-list{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start}
  .ov-photo-thumb-wrap{position:relative;display:inline-flex}
  .ov-photo-thumb-wrap img{width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid var(--line)}
  .ov-photo-rm{position:absolute;top:-5px;right:-5px;background:#e8000d;color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
  .ov-add-photo-btn{width:48px;height:48px;background:var(--panel2);border:1px dashed var(--line);border-radius:6px;color:var(--muted);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .12s}
  .ov-add-photo-btn:hover{border-color:var(--accent);color:var(--text)}
  /* (4K sizes above are authoritative — no overrides here) */
  /* bottom bar preset pills */
  .ov-bar-presets{display:flex;gap:6px;flex-wrap:wrap}
  .ov-bar-preset{background:var(--chip);border:1px solid var(--line);color:var(--muted);border-radius:16px;padding:4px 11px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .12s}
  .ov-bar-preset:hover{border-color:var(--accent);color:var(--text)}
  /* ov-tag 4K size defined above — no override */

  /* sub-topic pills (individual signings) */
  .ov-topic.sub{font-size:11px;padding:4px 10px;opacity:.8}
  .ov-topic.sub.active{opacity:1}
  .ov-topic-group-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:2px 4px;align-self:center;white-space:nowrap}

  /* ── Shorts tab ── */
  .shorts-wrap{padding:20px 24px;display:flex;flex-direction:column;gap:16px;max-width:900px}
  .shorts-section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .shorts-pills{display:flex;flex-wrap:wrap;gap:8px;min-height:24px}
  .shorts-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--line);color:var(--muted);background:var(--panel2);transition:all .15s;user-select:none}
  .shorts-pill:hover{border-color:var(--accent);color:var(--text)}
  .shorts-pill.active{border-color:var(--accent);color:var(--text);background:var(--panel)}
  .shorts-pill.used{border-color:#22c55e;color:#22c55e;background:rgba(34,197,94,.08)}
  .shorts-pill.used.active{background:rgba(34,197,94,.15)}
  .shorts-empty-pills{color:var(--muted);font-size:12px;font-style:italic;padding:4px 0}
  .shorts-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .shorts-card-header{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--panel2)}

<script>
// ---------- tiny markdown renderer ----------
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inline(s){
  s=esc(s);
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>');
  return s;
}
function mdToHtml(md){
  const lines=md.split('\n'); let html=''; let inList=false;
  const closeList=()=>{ if(inList){html+='</ul>';inList=false;} };
  for(let raw of lines){
    const line=raw.replace(/\s+$/,'');
    if(/^\s*---\s*$/.test(line)){closeList();html+='<hr>';continue;}
    let m;
    if(m=line.match(/^###\s+(.*)/)){closeList();html+='<h3>'+inline(m[1])+'</h3>';continue;}
    if(m=line.match(/^##\s+(.*)/)){closeList();html+='<h2>'+inline(m[1])+'</h2>';continue;}
    if(m=line.match(/^#\s+(.*)/)){closeList();html+='<h1>'+inline(m[1])+'</h1>';continue;}
    if(m=line.match(/^>\s?(.*)/)){closeList();html+='<blockquote>'+inline(m[1])+'</blockquote>';continue;}
    if(m=line.match(/^\s*[-*]\s+(.*)/)){ if(!inList){html+='<ul>';inList=true;} html+='<li>'+inline(m[1])+'</li>';continue;}
    if(line.trim()===''){closeList();continue;}
    closeList();html+='<p>'+inline(line)+'</p>';
  }
  closeList();return html;
}

// ---------- state ----------
let BRIEFS=[]; let current=null; let currentTab='brief';
const DOW=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(Date.UTC(y,m-1,d));}
function seasonLabel(s){const[y,m]=s.split('-').map(Number);const sy=m>=7?y:y-1;return sy+'–'+String(sy+1).slice(2)+' Season';}
function monthLabel(s){const[y,m]=s.split('-').map(Number);return MONTHS[m-1]+' '+y;}
function dowLabel(s){return DOW[parseDate(s).getUTCDay()];}
function dayNum(s){return Number(s.split('-')[2]);}

// ---------- cabinet ----------
const collapsed = new Set();
function buildTree(filter){
  const tree=document.getElementById('tree'); tree.innerHTML='';
  const f=(filter||'').toLowerCase();
  const items=BRIEFS.filter(b=> !f || b.date.includes(f) || (b.phase||'').toLowerCase().includes(f) || dowLabel(b.date).toLowerCase().includes(f));
  const seasons={};
  for(const b of items){
    const sk=seasonLabel(b.date); const mk=monthLabel(b.date);
    (seasons[sk]=seasons[sk]||{}); (seasons[sk][mk]=seasons[sk][mk]||[]).push(b);
  }
  const sKeys=Object.keys(seasons).sort().reverse();
  if(sKeys.length===0){ tree.innerHTML='<div style="color:var(--muted);padding:16px;font-size:13px">No briefs match.</div>'; return; }
  for(const sk of sKeys){
    const scount=Object.values(seasons[sk]).reduce((a,x)=>a+x.length,0);
    const sEl=document.createElement('div'); sEl.className='season'+(collapsed.has(sk)?' collapsed':'');
    sEl.innerHTML='<div class="hdr"><span class="caret">▾</span>'+sk+'<span class="count">'+scount+'</span></div><div class="body"></div>';
    sEl.querySelector('.hdr').onclick=()=>{toggle(sk);buildTree(document.getElementById('search').value);};
    const sBody=sEl.querySelector('.body');
    const mKeys=Object.keys(seasons[sk]).sort((a,b)=>new Date(b)-new Date(a));
    for(const mk of mKeys){
      const key=sk+'|'+mk;
      const mEl=document.createElement('div'); mEl.className='month'+(collapsed.has(key)?' collapsed':'');
      mEl.innerHTML='<div class="hdr"><span class="caret">▾</span>'+mk+'</div><div class="body"></div>';
      mEl.querySelector('.hdr').onclick=()=>{toggle(key);buildTree(document.getElementById('search').value);};
      const mBody=mEl.querySelector('.body');
      for(const b of seasons[sk][mk].sort((a,b)=>dayNum(b.date)-dayNum(a.date))){
        const d=document.createElement('div'); d.className='day'+(current&&current.date===b.date?' active':'');
        d.innerHTML='<span class="d">'+dayNum(b.date)+'</span><span class="dow">'+dowLabel(b.date)+'</span>'+(b.phase?'<span class="chip">'+shortPhase(b.phase)+'</span>':'');
        d.onclick=()=>selectBrief(b.file); mBody.appendChild(d);
      }
      sBody.appendChild(mEl);
    }
    tree.appendChild(sEl);
  }
}
function toggle(k){ collapsed.has(k)?collapsed.delete(k):collapsed.add(k); }
function shortPhase(p){ p=p.replace(/\(.*\)/,'').trim(); return p.length>18?p.slice(0,17)+'…':p; }

// ---------- GitHub API source ----------
const GH_REPO = 'xmanzalt/manza-hoops-daily-briefs';
const GH_BRANCH = 'main';

function parseYoutubeClient(md, date, phase) {
  const anglesStart = md.search(/^##\s*.*CONTENT ANGLES/im);
  const titles = [], thumbnails = [], angles = [];
  if (anglesStart !== -1) {
    const lines = md.slice(anglesStart).split('\n').slice(1);
    for (const line of lines) {
      if (/^##\s+/.test(line)) break;
      const titleM = line.match(/Title ideas?:\s*(.*)/i);
      if (titleM) {
        for (const m of titleM[1].matchAll(/\*?"([^"*\n]+)"\*?/g)) { const t=m[1].trim(); if(t) titles.push(t); }
        continue;
      }
      const thumbM = line.match(/Thumbnail(?:\s+text)?:\s*(.*)/i);
      if (thumbM) {
        for (const m of thumbM[1].matchAll(/`([^`]+)`/g)) { const t=m[1].trim(); if(t) thumbnails.push(t); }
        continue;
      }
      const bulletM = line.match(/^\s*[-*]\s+(.*)/);
      if (bulletM) {
        const clean = bulletM[1].replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').trim();
        angles.push(clean);
      }
    }
  }
  const breakStart = md.search(/^##\s*.*BREAKING/im);
  const breakingBullets = [];
  if (breakStart !== -1) {
    const lines = md.slice(breakStart).split('\n').slice(1);
    for (const line of lines) {
      if (/^##\s+/.test(line) || /^\s*---\s*$/.test(line)) break;
      const m = line.match(/^\s*[-*]\s+(.*)/);
      if (m) {
        const clean = m[1].replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').replace(/→\s*/g,'— ').trim();
        breakingBullets.push(clean);
      }
    }
  }
  const nameSet = new Set(['NBA','basketball','Manza Hoops','NBA highlights']);
  const skipWords = /^(CONFIRMED|RUMOR|DONE|MAX|BREAKING|FREE AGENCY|AGENT|INJURY|REPORT|LOOKING|CONTENT|SOURCE|TELEPROMPTER|OFFSEASON|REGULAR|SEASON|PLAYOFFS|DRAFT|SUMMER LEAGUE|PRESEASON)$/i;
  for (const m of md.matchAll(/\*\*([A-Z][A-Za-zé'À-ɏ .]{2,28})\*\*/g)) {
    const name = m[1].trim();
    if (!skipWords.test(name) && name.split(/\s+/).length <= 4) nameSet.add(name);
  }
  const year = date.split('-')[0];
  const p = (phase||'').toUpperCase();
  if (p.includes('FREE AGENCY')) { nameSet.add('NBA free agency '+year); nameSet.add('NBA offseason '+year); }
  if (p.includes('SUMMER LEAGUE')) nameSet.add('NBA Summer League '+year);
  if (p.includes('PLAYOFF')) nameSet.add('NBA playoffs '+year);
  if (p.includes('DRAFT')) nameSet.add('NBA Draft '+year);
  return { titles, thumbnails, angles, breakingBullets, tags: Array.from(nameSet) };
}

function parseBriefClient(file, md) {
  const date = file.replace(/\.md$/, '');
  const phaseMatch = md.match(/Phase:\s*\*\*([^*]+)\*\*/i);
  const phase = phaseMatch ? phaseMatch[1].trim() : '';
  const titleMatch = md.match(/^#\s+(.+)$/m);
  const title = titleMatch ? titleMatch[1].replace(/[🏀]/gu,'').trim() : date;
  const scriptHeadingRe = /^##\s*.*TELEPROMPTER SCRIPT.*$/im;
  let script = '';
  const hIdx = md.search(scriptHeadingRe);
  if (hIdx !== -1) {
    let after = md.slice(hIdx).split('\n').slice(1).join('\n');
    script = after.split('\n')
      .filter(line => !/^\s*\*[^*].*\*\s*$/.test(line.trim()))
      .filter(line => !/^\s*---\s*$/.test(line))
      .join('\n').trim();
  }
  const youtube = parseYoutubeClient(md, date, phase);
  return { file, date, phase, title, markdown: md, script, youtube };
}

// ---------- load / select ----------
async function loadList(){
  try {
    const r = await fetch('https://api.github.com/repos/'+GH_REPO+'/contents/briefs?ref='+GH_BRANCH);
    if (!r.ok) throw new Error('GitHub API '+r.status);
    const files = await r.json();
    const briefFiles = files
      .filter(f => /^\d{4}-\d{2}-\d{2}\.md$/.test(f.name))
      .sort((a,b) => b.name.localeCompare(a.name));
    BRIEFS = briefFiles.map(f => ({ file: f.name, date: f.name.replace(/\.md$/,''), phase:'', title: f.name.replace(/\.md$/,''), hasScript: true }));
    document.getElementById('sub').textContent = 'Daily News Database · '+BRIEFS.length+' brief'+(BRIEFS.length===1?'':'s');
    buildTree(document.getElementById('search').value);
    // Auto-select today's brief if it exists, otherwise most recent
    const todayFile = new Date().toISOString().slice(0,10) + '.md';
    const todayBrief = BRIEFS.find(b => b.file === todayFile);
    if (!current) selectBrief((todayBrief || BRIEFS[0]).file);
    // Auto-open sidebar on load
    document.getElementById('app').classList.remove('sidebar-collapsed');
  } catch(e) {
    document.getElementById('sub').textContent = 'Error loading briefs — check connection';
    console.error(e);
  }
}
async function selectBrief(file){
  const r = await fetch('https://raw.githubusercontent.com/'+GH_REPO+'/'+GH_BRANCH+'/briefs/'+encodeURIComponent(file));
  const md = await r.text();
  current = parseBriefClient(file, md);
  // reset per-brief state only — preserve logo, theme, bgColor across briefs
  OV.headline=''; OV.subtext=''; OV.activeTopicIdx=0; OV.bottomBar=''; OV.topics=[]; OV.photos=[];
  // if coming from a sidebar pinned view, switch back to brief tabs
  if(currentTab==='blank'||currentTab==='general-ideas'){
    currentTab='brief';
    document.querySelectorAll('.sidebar-pin-btn').forEach(b=>b.classList.remove('active'));
  }
  document.querySelector('.tabs').style.display='';
  const displayTitle=(current.title||current.date).replace(/\s*[—–-]+\s*.*/,'').replace(/\bCUE SHEET\b/gi,'').trim();
  document.getElementById('title').textContent=displayTitle;
  document.getElementById('meta').innerHTML=
    dowLabel(current.date)+', '+monthLabel(current.date).replace(/(\d{4})/,dayNum(current.date)+', $1')+
    ' &nbsp;·&nbsp; '+seasonLabel(current.date)+
    (current.phase?' &nbsp;<span class="chip" style="margin:0">'+current.phase+'</span>':'');
  buildTree(document.getElementById('search').value);
  if(currentTab==='overlay') renderOverlayTab();
  else renderTab();
}
function renderTab(){
  const c=document.getElementById('content');
  if(currentTab==='blank'){
    if(!c.querySelector('.blank-wrap')){
      c.innerHTML=`<div class="blank-wrap">
        <textarea id="blankScript" placeholder="Paste or type any script here, then hit Launch…" spellcheck="false"></textarea>
        <div class="blank-actions">
          <button class="btn primary" id="blankLaunch">▶ Launch Teleprompter</button>
          <button class="btn" id="blankClear">Clear</button>
          <span class="blank-hint">Space = play/pause · ↑/↓ = speed · Esc = close</span>
        </div>
      </div>`;
      document.getElementById('blankLaunch').onclick=()=>{
        const txt=document.getElementById('blankScript').value.trim();
        if(!txt){alert('Type or paste a script first.');return;}
        openTpWithText(txt);
      };
      document.getElementById('blankClear').onclick=()=>{ document.getElementById('blankScript').value=''; };
    }
    return;
  }
  if(currentTab==='general-ideas'){ renderGeneralIdeasTab(); return; }
  if(currentTab==='overlay'){ renderOverlayTab(); return; }
  if(currentTab==='shorts'){ renderShortsTab(); return; }

const tp=document.getElementById('tp'), tpInner=document.getElementById('tpInner'), tpScroll=document.getElementById('tpScroll');
let tpPlaying=false, tpPos=0, tpSpeed=60, tpRAF=null, tpLast=0;
function openTpWithText(text){
  tpInner.innerHTML=text.split(/\n{2,}/).map(p=>'<p>'+esc(p.trim()).replace(/\n/g,' ')+'</p>').join('');
  tp.classList.add('open'); tpPos=0; applyPos(); setPlaying(true);
}
function openTp(){
  if(!current||!current.script){alert('No script for this day yet.');return;}
  openTpWithText(current.script);
}
function closeTp(){ setPlaying(false); tp.classList.remove('open'); }
function applyPos(){ const m=tp.classList.contains('mirror')?'scaleX(-1) ':''; tpInner.style.transform=m+'translateY('+(-tpPos)+'px)'; }
function maxPos(){ return tpInner.scrollHeight - tpScroll.clientHeight*0.15; }
function setPlaying(p){ tpPlaying=p; document.getElementById('tpPlay').textContent=p?'∥ Pause':'▶ Play';
  if(p){ tpLast=performance.now(); tpRAF=requestAnimationFrame(tick);} else if(tpRAF){cancelAnimationFrame(tpRAF);tpRAF=null;} }
function tick(now){ const dt=(now-tpLast)/1000; tpLast=now; tpPos+=tpSpeed*dt;
  if(tpPos>=maxPos()){tpPos=maxPos();applyPos();setPlaying(false);return;} applyPos(); updateTpProgress(); tpRAF=requestAnimationFrame(tick); }
function updateTpProgress(){
  const pct = maxPos() > 0 ? Math.min(100, tpPos/maxPos()*100) : 0;
  const bar = document.getElementById('tpProgressBar');
  if(bar) bar.style.width = pct+'%';
  const est = document.getElementById('tpTimeEst');
  if(est && tpSpeed > 0){
    const remaining = Math.max(0, maxPos()-tpPos)/tpSpeed;
    est.textContent = remaining < 60 ? Math.round(remaining)+'s left' : Math.round(remaining/60)+'m left';
  }
}
document.getElementById('openTp').onclick=()=>{
  if(currentTab==='script') openTp();
  else if(currentTab==='brief') { if(!current||!current.markdown){alert('No brief loaded.');return;} openTpWithText(current.markdown); }
  else openTp();
};
document.getElementById('tpClose').onclick=closeTp;
document.getElementById('tpPlay').onclick=()=>setPlaying(!tpPlaying);
document.getElementById('tpRestart').onclick=()=>{tpPos=0;applyPos();setPlaying(true);};
const speedR=document.getElementById('tpSpeed');
speedR.oninput=e=>{tpSpeed=+e.target.value;document.getElementById('tpSpeedV').textContent=tpSpeed;};
const fontR=document.getElementById('tpFont');
fontR.oninput=e=>{tpInner.style.fontSize=e.target.value+'px';document.getElementById('tpFontV').textContent=e.target.value;};
tpInner.style.fontSize='46px';
document.getElementById('tpMirror').onclick=e=>{tp.classList.toggle('mirror');e.target.classList.toggle('on');applyPos();};
document.addEventListener('keydown',e=>{
  const inInput = ['INPUT','TEXTAREA'].includes(document.activeElement.tagName) || document.activeElement.isContentEditable;
  if(tp.classList.contains('open')){
    if(e.code==='Space'){e.preventDefault();setPlaying(!tpPlaying);}
    else if(e.code==='Escape'){closeTp();}
    else if(e.code==='ArrowUp'){tpSpeed=Math.min(180,tpSpeed+8);speedR.value=tpSpeed;document.getElementById('tpSpeedV').textContent=tpSpeed;}
    else if(e.code==='ArrowDown'){tpSpeed=Math.max(10,tpSpeed-8);speedR.value=tpSpeed;document.getElementById('tpSpeedV').textContent=tpSpeed;}
    else if(e.code==='ArrowLeft'){e.preventDefault();tpPos=Math.max(0,tpPos-tpSpeed*3);applyPos();updateTpProgress();}
    else if(e.code==='ArrowRight'){e.preventDefault();tpPos=Math.min(maxPos(),tpPos+tpSpeed*3);applyPos();updateTpProgress();}
  } else if(!inInput){
    if(e.key==='t'||e.key==='T'){e.preventDefault();document.getElementById('openTp').click();}
    else if(e.key==='y'||e.key==='Y'){e.preventDefault();if(current)document.getElementById('openYt').click();}
  }
});
tpScroll.addEventListener('wheel',e=>{
  e.preventDefault();
  tpPos=Math.max(0,Math.min(maxPos(),tpPos+e.deltaY*0.8));

},{passive:false});

function makeEditableSection(body, labelText, initialText) {

function makeTitlesSection(body, titles) {
  const sec = document.createElement('div');
  sec.className = 'yt-section';
  const lbl = document.createElement('div');
  lbl.className = 'yt-label';
  lbl.innerHTML = '<span>Title</span>';
  const hint = document.createElement('div');
  hint.className = 'yt-hint';
  hint.textContent = 'click to copy · double-click to edit';
  const rows = document.createElement('div');
  rows.className = 'yt-titles';
  function addTitleRow(text) {
    const row = document.createElement('div');
    row.className = 'yt-title-row';
    const field = document.createElement('div');
    field.className = 'yt-field';
    field.textContent = text;
    field.onclick = () => { if(field.contentEditable==='true')return; copyText(fieldText(field),field); };
    field.ondblclick = () => { field.contentEditable='true'; field.focus(); };
    field.onblur = () => { field.contentEditable='false'; };
    field.onkeydown = e => {
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();field.blur();}
      if(e.key==='Escape'){field.blur();}
    };
    field.contentEditable='false';
    row.appendChild(field);
    rows.appendChild(row);
  }
  (titles||[]).forEach(t=>addTitleRow(t));
  const addBtn=document.createElement('button');
  addBtn.className='yt-add-title';
  addBtn.textContent='+ Add title option';
  addBtn.onclick=()=>{
    addTitleRow('');
    const newField=rows.lastElementChild.querySelector('.yt-field');
    newField.contentEditable='true';
    newField.focus();
  };
  sec.appendChild(lbl);
  sec.appendChild(hint);
  sec.appendChild(rows);
  rows.appendChild(addBtn);
  body.appendChild(sec);
}

// Parse sections from brief markdown into topic toggles
function parseOverlayTopics(md) {
  if (!md) return [];
  const SECTION_MAP = [
    { re:/BREAKING|TOP STORIES/i, label:'🔴 Breaking', tag:'BREAKING' },
    { re:/INJURY|AVAILABILITY/i, label:'🚨 Injury', tag:'INJURY' },
    { re:/FREE AGENCY|SIGNINGS|MOVES/i, label:'🏀 Free Agency', tag:'FA', isFA:true },
    { re:/GAME RECAP|SUMMER LEAGUE/i, label:'🏀 Scores', tag:'SCORES' },
    { re:/TRADE|RUMOR/i, label:'🔁 Trades', tag:'TRADES', isTrades:true },
    { re:/QUOTE|DRAMA|SOCIAL/i, label:'🎤 Drama', tag:'DRAMA' },
    { re:/LOOKING AHEAD/i, label:'📅 Ahead', tag:'AHEAD' },
  ];
  const lines = md.split('\n');
  const sections = [];
  let curSection = null;
  for (const raw of lines) {
    const line = raw.trim();
    if (/^##\s+/.test(line)) {
      if (curSection) sections.push(curSection);
      const heading = line.replace(/^##\s+/, '').replace(/[🔴🚨🏀🔁🎤📅💡🔗🎙️]/gu,'').trim();
      const match = SECTION_MAP.find(m => m.re.test(heading));
      curSection = {
        label: match ? match.label : heading.slice(0,22),
        tag:   match ? match.tag   : heading.slice(0,10).toUpperCase(),
        rawHeading: heading,
        bullets: [],
        tableRows: [],
        isFA: !!(match && match.isFA),
        isTrades: !!(match && match.isTrades),
      };
    } else if (curSection && /^\|/.test(line)) {
      const cells = line.split('|').map(c=>c.replace(/\*\*/g,'').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').trim()).filter(Boolean);
      if (cells.length >= 3 && !/^[-:]+$/.test(cells[0]) && !/^Player/i.test(cells[0])) {
        curSection.tableRows.push({ player:cells[0], deal:cells[1], team:cells[2] });
      }
    } else if (curSection && /^\s*[-*•]\s+/.test(line)) {
      const clean = line
        .replace(/^\s*[-*•]\s+/,'')
        .replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1')
        .replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').replace(/`([^`]+)`/g,'$1')
        .replace(/→\s*/g,'— ').replace(/>\s+.*$/,'').trim();
      if (clean) curSection.bullets.push(clean);
    }
  }
  if (curSection) sections.push(curSection);

  const result = [];
  for (const s of sections) {
    const first = s.bullets[0] || s.rawHeading;
    const headlineRaw = first.replace(/\s*[.—–:]\s+.*/,'').replace(/—.*/,'').trim().toUpperCase().slice(0,70);
    const subRaw = (s.bullets[1]||s.bullets[0]||'').slice(0,110);
    const sect = { label:s.label, tag:s.tag, headline:headlineRaw, subtext:subRaw, allBullets:s.bullets };
    if (sect.headline) result.push(sect);

    // Expand FA table rows as individual pills
    if ((s.isFA || s.isTrades) && s.tableRows.length) {
      for (const row of s.tableRows) {
        const lastName = row.player.replace(/\bJr\.?\s*$/i,'').trim().split(' ').pop();
        result.push({
          label: lastName.slice(0,12),
          tag: s.isFA ? 'SIGNING' : 'TRADE',
          headline: (row.player + ' → ' + row.team).toUpperCase().slice(0,70),
          subtext: row.deal,
          allBullets: [row.player + ' → ' + row.team + '  ·  ' + row.deal],
          isSub: true,
        });
      }
      // Also expand confirmed trade bullets from trades section
      if (s.isTrades && s.bullets.length) {
        for (const b of s.bullets) {
          if (/→|trade/i.test(b) && b.length < 120) {
            const parts = b.split(/→|—/);
            const lbl = parts[0].replace(/✅|confirmed|reported/gi,'').trim().split(' ').pop().slice(0,12);
            result.push({
              label: lbl,
              tag: 'TRADE',
              headline: b.replace(/✅\s*/,'').replace(/\s*\(.*$/,'').toUpperCase().slice(0,70),
              subtext: b.replace(/.*\((.*)\).*/,'$1').slice(0,110),
              allBullets: [b],
              isSub: true,
            });
          }
        }
      }
    }
  }
  return result.filter(s => s.headline);
}

function shortsStorageKey(date){ return 'shorts_v1_' + date; }

function getShortsState(date){
  try { return JSON.parse(localStorage.getItem(shortsStorageKey(date))); } catch{ return null; }
}

function saveShortsState(date, state){
  localStorage.setItem(shortsStorageKey(date), JSON.stringify(state));
}

function parseShortsAngles(md){
  const start = md.search(/^##\s*.*CONTENT ANGLES/im);
  if(start === -1) return [];
  const lines = md.slice(start).split('\n').slice(1);
  const angles = [];
  for(const line of lines){
    if(/^##/.test(line)) break;
    const m = line.match(/^\s*[-*]\s+(.*)/);
    if(!m) continue;
    const text = m[1].replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').trim();
    if(/Title ideas?:/i.test(text) || /Thumbnail/i.test(text)) continue;
    angles.push(text);
  }
  return angles;
}

function parseTitlesFromBrief(md){
  const titleLine = md.match(/Title ideas?:\s*(.*)/i);
  if(!titleLine) return [];
  return [...titleLine[1].matchAll(/[""]([^""]+)[""]/g)].map(m=>m[1].trim())
    .concat([...titleLine[1].matchAll(/\*"([^"*]+)"\*/g)].map(m=>m[1].trim()))
    .filter((v,i,a)=>a.indexOf(v)===i);
}

function parseBreakingBullets(md){
  const start = md.search(/^##\s*.*BREAKING/im);
  if(start === -1) return [];
  const bullets = [];
  const lines = md.slice(start).split('\n').slice(1);
  for(const line of lines){
    if(/^##/.test(line)) break;
    const m = line.match(/^\s*[-*]\s+(.*)/);
    if(m) bullets.push(m[1].replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').trim());
  }
  return bullets;
}

function generateShortsFromBrief(brief){
  const md = brief.markdown;
  const angles = parseShortsAngles(md);
  const allTitles = parseTitlesFromBrief(md);
  const breaking = parseBreakingBullets(md);
  const phase = (brief.phase || 'NBA').replace(/offseason\s*\/\s*/i,'').trim();
  const year = brief.date.split('-')[0];

  return angles.map((angle, i) => {
    // Pull up to 3 title suggestions cycling through the pool
    const t = [0,1,2].map(j => allTitles[i*3+j] || allTitles[(i+j) % Math.max(allTitles.length,1)] || '');
    // If we still don't have 3, generate fallbacks
    const clean = angle.replace(/^"([^"]+)".*/,'$1').replace(/—.*/,'').trim();
    if(!t[0]) t[0] = clean + ' (Full Breakdown)';
    if(!t[1]) t[1] = 'NBA Update: ' + clean.slice(0,55);
    if(!t[2]) t[2] = clean + ' — What This Means For Next Season';

    // Relevant context from breaking bullets
    const angleWords = angle.toLowerCase().split(/\W+/).filter(w=>w.length>4);
    const relevant = breaking.filter(b => angleWords.some(w=>b.toLowerCase().includes(w))).slice(0,3);
    const topicsText = (relevant.length ? relevant : [angle]).map(b=>'• '+b.slice(0,120)).join('\n');

    // Video outline — structured guidance
    const outline =
`HOOK
Open on the most surprising or provocative angle: "${clean.slice(0,60)}${clean.length>60?'…':''}". Lead with what makes this story feel urgent TODAY.

CONTEXT
${relevant.length ? relevant[0].slice(0,140) : angle}
Brief setup only — get to the good stuff fast.

DEEP DIVE — WHAT TO COVER
${relevant.map(b=>'• '+b.slice(0,120)).join('\n') || '• '+angle}
• Address the obvious question or counterargument
• Add one comparison or stat that reframes the story

YOUR TAKE & CLOSE
State your read on this clearly. Close with a question that drives comments — debate = algorithm fuel.

📚 RESEARCH
  • NBA.com Transactions → https://www.nba.com/players/transactions
  • Basketball-Reference → https://www.basketball-reference.com
  • StatMuse → https://www.statmuse.com/nba
  • HoopsHype Rumors → https://hoopshype.com/rumors/
  • Spotrac (contracts) → https://www.spotrac.com/nba`;

    // Header text: punchy ALL CAPS
    const headerText = clean.toUpperCase().slice(0,52);

    // Description
    const desc = `${clean}. Breaking down every detail of the latest NBA news. ${phase} ${year} is moving fast — drop your thoughts below.\n\n#NBA #NBAFreeAgency #ManzaHoops`;

    // Tags
    const nameMatches = [...angle.matchAll(/\b([A-Z][a-zé]+(?:\s[A-Z][a-zé]+)+)\b/g)].map(m=>'#'+m[1].replace(/\s/g,''));
    const tags = ['#NBA','#NBAFreeAgency','#NBATwitter','#Basketball','#ManzaHoops',
      '#NBAShorts','#HoopsNews','#' + phase.replace(/\s+/g,''),
      ...nameMatches].filter((v,i,a)=>a.indexOf(v)===i).slice(0,12).join(' ');

    return {
      id: 'sh_' + brief.date + '_' + i,
      status: 'idea',          // 'idea' | 'use'
      videoIdea: angle,
      topics: topicsText,
      outline,
      titles: [t[0], t[1], t[2]],
      headerText,
      description: desc,
      tags,
    };
  });
}

      p.textContent = s.videoIdea.slice(0,38) + (s.videoIdea.length>38?'…':'');
      p.title = s.videoIdea;
      p.onclick = ()=>{ shortsActiveId=s.id; renderShortsTab(); };
      pills.appendChild(p);
    });
    useSection.appendChild(pills);
    wrap.appendChild(useSection);
  }

  // ── Ideas section ──
  const ideasSection = document.createElement('div');
  ideasSection.innerHTML = `<div class="shorts-section-label">💡 Ideas</div>`;
  const pillsPool = document.createElement('div');
  pillsPool.className = 'shorts-pills';
  if(pool.length){
    pool.forEach(s=>{
      const p = document.createElement('div');
      p.className = 'shorts-pill' + (s.id===shortsActiveId?' active':'');
      p.textContent = s.videoIdea.slice(0,38) + (s.videoIdea.length>38?'…':'');
      p.title = s.videoIdea;
      p.onclick = ()=>{ shortsActiveId=s.id; renderShortsTab(); };
      pillsPool.appendChild(p);
    });
  } else {
    const empty = document.createElement('div');
    empty.className = 'shorts-empty-pills';
    empty.textContent = pool.length===0 && used.length ? 'All ideas are in use.' : 'No ideas generated.';
    pillsPool.appendChild(empty);
  }
  ideasSection.appendChild(pillsPool);
  wrap.appendChild(ideasSection);

  // ── Active card ──
  if(active){
    const card = document.createElement('div');
    card.className = 'shorts-card';

    // Card header with Use / Discard buttons
    const hdr = document.createElement('div');
    hdr.className = 'shorts-card-header';
    const ttl = document.createElement('div');
    ttl.className = 'shorts-card-title';
    ttl.textContent = active.videoIdea.slice(0,70) + (active.videoIdea.length>70?'…':'');
    hdr.appendChild(ttl);

    const useBtn = document.createElement('button');
    useBtn.className = 'shorts-btn-use' + (active.status==='use'?' already':'');
    useBtn.textContent = active.status==='use' ? '✅ In Use' : '✓ Use';
    useBtn.onclick = ()=>{
      const st2 = getShortsState(current.date);
      const idea = st2.ideas.find(s=>s.id===active.id);
      if(idea) idea.status = idea.status==='use' ? 'idea' : 'use';
      saveShortsState(current.date, st2);
      renderShortsTab();
    };

    const discardBtn = document.createElement('button');
    discardBtn.className = 'shorts-btn-discard';
    discardBtn.textContent = '✕ Discard';
    discardBtn.onclick = ()=>{
      if(!confirm('Discard this short idea? This removes it from the list.')) return;
      const st2 = getShortsState(current.date);
      const idea = st2.ideas.find(s=>s.id===active.id);
      if(idea) idea.status = 'discarded';
      saveShortsState(current.date, st2);
      shortsActiveId = null;
      renderShortsTab();
    };

    hdr.appendChild(useBtn);
    hdr.appendChild(discardBtn);
    card.appendChild(hdr);

    // Card body fields
    const body = document.createElement('div');
    body.className = 'shorts-card-body';

    function field(labelText, badges, tagName, value, fieldKey, placeholder, rows){
      const f = document.createElement('div');
      f.className = 'shorts-field';
      const lbl = document.createElement('div');
      lbl.className = 'shorts-field-label';
      lbl.innerHTML = labelText + badges;
      f.appendChild(lbl);
      let el;
      if(tagName==='textarea'){
        el = document.createElement('textarea');
        el.rows = rows || 3;
      } else {
        el = document.createElement('input');
        el.type = 'text';
      }
      el.value = value;
      el.placeholder = placeholder || '';
      el.oninput = ()=>{
        const st2 = getShortsState(current.date);
        const idea = st2.ideas.find(s=>s.id===active.id);
        if(idea) idea[fieldKey] = el.value;
        saveShortsState(current.date, st2);
      };
      f.appendChild(el);
      return f;
    }

    function badge(txt, cls){ return `<span class="shorts-platform ${cls}">${txt}</span>`; }
    const all3 = badge('TikTok','tiktok')+badge('IG Reels','ig')+badge('YT Shorts','yt');
    const ytOnly = badge('YT Shorts only','yt');
    const igTt = badge('TikTok','tiktok')+badge('IG Reels','ig');

    body.appendChild(field('VIDEO IDEA', badge('All platforms','all'), 'textarea', active.videoIdea, 'videoIdea', 'Describe the video concept and filming style…', 2));
    body.appendChild(field('TOPICS COVERED', badge('All platforms','all'), 'textarea', active.topics, 'topics', '• Topic 1\n• Topic 2', 3));
    body.appendChild(field('VIDEO OUTLINE', badge('All platforms','all'), 'textarea', active.outline, 'outline', '[0:00] Hook…', 5));

    // Titles — 3 clickable-to-copy inputs
    const titlesField = document.createElement('div');
    titlesField.className = 'shorts-field';
    const titlesLbl = document.createElement('div');
    titlesLbl.className = 'shorts-field-label';
    titlesLbl.innerHTML = 'TITLE SUGGESTIONS <span style="color:var(--muted);font-size:9px;font-weight:400;letter-spacing:0;text-transform:none">click to copy</span>' + all3;
    titlesField.appendChild(titlesLbl);
    const titlesWrap = document.createElement('div');
    titlesWrap.className = 'shorts-titles';
    active.titles.forEach((t, ti)=>{
      const row = document.createElement('div');
      row.className = 'shorts-title-opt';
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'shorts-title-text';
      inp.value = t;
      inp.oninput = ()=>{
        const st2 = getShortsState(current.date);
        const idea = st2.ideas.find(s=>s.id===active.id);
        if(idea){ idea.titles[ti] = inp.value; saveShortsState(current.date, st2); }
      };
      const copyBtn = document.createElement('button');
      copyBtn.className = 'shorts-copy-btn';
      copyBtn.textContent = 'Copy';
      copyBtn.onclick = ()=>{
        navigator.clipboard.writeText(inp.value).then(()=>{
          copyBtn.textContent = 'Copied!';
          copyBtn.classList.add('copied');
          setTimeout(()=>{ copyBtn.textContent='Copy'; copyBtn.classList.remove('copied'); }, 1800);
        });
      };
      row.appendChild(inp);
      row.appendChild(copyBtn);
      titlesWrap.appendChild(row);
    });
    titlesField.appendChild(titlesWrap);
    body.appendChild(titlesField);

    body.appendChild(field('HEADER / ONSCREEN TEXT', igTt, 'input', active.headerText, 'headerText', 'Short punchy ALL CAPS line for the screen…'));
    body.appendChild(field('DESCRIPTION', all3, 'textarea', active.description, 'description', 'Caption / description for the post…', 4));
    body.appendChild(field('TAGS / HASHTAGS', all3, 'input', active.tags, 'tags', '#NBA #ManzaHoops…'));

    card.appendChild(body);
    wrap.appendChild(card);
  }

  c.innerHTML = '';
  c.appendChild(wrap);
  c.scrollTop = 0;
}

function renderOverlayTab() {
  const c = document.getElementById('content');
  if (!current) {
    c.innerHTML = '<div class="empty"><div class="big">🎬</div>Load a brief first — topics will appear automatically.</div>';
    return;
  }

  OV.topics = parseOverlayTopics(current.markdown);
  // build opener summary from phase + top 2 breaking headlines
  if (!OV.bottomBar) {
    const phase = (current.phase || '').toUpperCase().replace(/OFFSEASON\s*\/\s*/i,'').trim();
    const breaking = OV.topics.filter(t => t.tag === 'BREAKING' || !t.isSub).slice(0,2).map(t =>
      t.headline.replace(/[.—–]+.*/,'').trim().slice(0,40)
    ).filter(Boolean);
    if (phase && breaking.length) {
      OV.bottomBar = phase + '  ·  ' + breaking.join('  +  ');
    } else if (breaking.length) {
      OV.bottomBar = breaking.join('  ·  ');
    } else {
      OV.bottomBar = 'NBA DAILY BREAKDOWN  ·  MANZA HOOPS';
    }
  }
  if (!OV.headline && OV.topics.length) {
    OV.headline = OV.topics[0].headline;
    OV.subtext  = OV.topics[0].subtext;
    OV.activeTopicIdx = 0;
  }

  c.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'ov-wrap';
  c.appendChild(wrap);

  // ── Section label ──
  const previewLbl = document.createElement('div');
  previewLbl.className = 'ov-preview-label';
  previewLbl.textContent = 'Topic';
  wrap.appendChild(previewLbl);

  // ── Topic toggles ──

  topicsRow.className = 'ov-topics';

    const btn = document.createElement('button');

    btn.textContent = t.label;
    btn.onclick = () => {
      OV.activeTopicIdx = i;

function renderDragPhotos(container) {
  if (!container) container = document.getElementById('ovPreviewWrap');
  if (!container) return;

  OV.photos.forEach(photo => {

    const img = document.createElement('img');
    img.src = photo.dataUrl;
    img.style.cssText = 'width:100%;height:auto;display:block;pointer-events:none';
    wrap.appendChild(img);
    const handle = document.createElement('div');
    handle.className = 'ov-ph-handle';
    wrap.appendChild(handle);
    container.appendChild(wrap);
    makeDraggablePhoto(wrap, handle, container, photo);
  });
}

function makeDraggablePhoto(wrap, handle, container, photo) {
  // drag to move
  wrap.addEventListener('mousedown', e => {
    if (e.target === handle) return;
    e.preventDefault();
    const cr = container.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY, sl = photo.x, st = photo.y;
    const onMove = ev => {
      photo.x = Math.max(-10, sl + (ev.clientX - sx) / cr.width  * 100);
      photo.y = Math.max(-10, st + (ev.clientY - sy) / cr.height * 100);
      wrap.style.left = photo.x + '%';
      wrap.style.top  = photo.y + '%';
    };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  // corner handle to resize
  handle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    const cr = container.getBoundingClientRect();
    const sx = e.clientX, sw = photo.w;
    const onMove = ev => {
      photo.w = Math.max(3, sw + (ev.clientX - sx) / cr.width * 100);
      wrap.style.width = photo.w + '%';
    };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

async function downloadOverlayAtSize(px, filename, btn) {
  const el = document.getElementById('ovScaleInner');
  if (!el || typeof html2canvas === 'undefined') { alert('Export not ready — reload and try again.'); return; }
  if (btn) btn.textContent = 'Rendering…';
  try {
    const exportScale = px / el.offsetWidth;
    const canvas = await html2canvas(el, {
      scale: exportScale, useCORS: true, allowTaint: true,
      backgroundColor: OV.bgColor, logging: false, imageTimeout: 0
    });
    const a = document.createElement('a');
    a.download = filename;
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch(e) { alert('PNG export failed: ' + e.message); }
  if (btn) btn.textContent = btn.dataset.label || btn.textContent;
}
async function downloadOverlayPng() {
  const btn = document.getElementById('ovDownloadLoop');
  await downloadOverlayAtSize(3840, 'manza-banner-4k.png', btn);
  if (btn) btn.textContent = '⬇ 4K PNG (3840px)';
}

async function downloadOverlayLoop() {
  // Bottom bar is now static — just export a high-res PNG (same as downloadOverlayPng)

  await downloadOverlayPng();

function generateGVIIdeas(categoryFilter){
  let state = getGVIState() || { ideas: [] };
  const existingAngles = new Set(state.ideas.map(i=>i.videoIdea));

  const catsToGenerate = categoryFilter === 'all'
    ? GVI_CATEGORIES.map(c=>c.key)
    : [categoryFilter];

  let added = 0;
  for(const catKey of catsToGenerate){
    const pool = GVI_TEMPLATES[catKey] || [];
    const fresh = pool.filter(t => !existingAngles.has(t.angle));
    // pick up to 2 fresh per category per generate press
    const picks = fresh.slice(0, 2);
    for(const tpl of picks){
      state.ideas.push(buildGVIIdea(tpl, catKey));
      existingAngles.add(tpl.angle);
      added++;
    }
    // if pool is exhausted, generate a variant by re-adding with a fresh id
    if(picks.length === 0 && pool.length > 0){
      const tpl = pool[Math.floor(state.ideas.length % pool.length)];
      state.ideas.push(buildGVIIdea(tpl, catKey));
      added++;
    }
  }
  saveGVIState(state);
  return added;
}

  topBar.appendChild(catPills);

  const genBtn = document.createElement('button');
  genBtn.className = 'gvi-generate-btn';
  genBtn.textContent = '🔄 Generate Ideas';
  genBtn.onclick = ()=>{
    const added = generateGVIIdeas(gviCatFilter);
    if(added===0) genBtn.textContent = '✓ All used!';
    else { genBtn.textContent = `✓ +${added} added`; }
    setTimeout(()=>{ genBtn.textContent='🔄 Generate Ideas'; renderGeneralIdeasTab(); }, 800);
  };
  topBar.appendChild(genBtn);

  if(allIdeas.length){
    const clrBtn = document.createElement('button');
    clrBtn.className = 'gvi-clear-btn';
    clrBtn.textContent = 'Clear discarded';
    clrBtn.onclick = ()=>{
      const st2 = getGVIState() || { ideas: [] };
      st2.ideas = st2.ideas.filter(i=>i.status!=='discarded');
      saveGVIState(st2);
      renderGeneralIdeasTab();
    };
    topBar.appendChild(clrBtn);
    const cnt = document.createElement('span');
    cnt.className = 'gvi-count';
    cnt.textContent = allIdeas.length + ' ideas total';
    topBar.appendChild(cnt);
  }
  wrap.appendChild(topBar);

  // Empty state
  if(filtered.length===0){
    const empty = document.createElement('div');
    empty.className = 'gvi-empty';
    empty.innerHTML = '<div style="font-size:36px;margin-bottom:10px">💡</div>'
      + (state.ideas.length===0
        ? 'No ideas yet — hit <strong>🔄 Generate Ideas</strong> to fill the board.'
        : 'No ideas in this category yet. Hit <strong>🔄 Generate Ideas</strong> to add more.');
    empty.innerHTML += '<div class="gvi-empty-hint">Ideas are saved locally and persist between sessions.</div>';
    wrap.appendChild(empty);
    c.innerHTML = ''; c.appendChild(wrap); c.scrollTop=0;
    return;
  }

  // ── In Use pills ──
  if(used.length){
    const useSec = document.createElement('div');
    useSec.innerHTML = '<div class="gvi-section-label">✅ In Use</div>';
    const pills = document.createElement('div');
    pills.className = 'shorts-pills';
    used.forEach(s=>{
      const p = document.createElement('div');
      p.className = 'shorts-pill used'+(s.id===gviActiveId?' active':'');
      p.textContent = s.videoIdea.slice(0,42)+(s.videoIdea.length>42?'…':'');
      p.title = s.videoIdea;
      p.onclick=()=>{ gviActiveId=s.id; renderGeneralIdeasTab(); };
      pills.appendChild(p);
    });
    useSec.appendChild(pills);
    wrap.appendChild(useSec);
  }

  // ── Ideas pills ──
  if(pool.length){
    const ideaSec = document.createElement('div');
    ideaSec.innerHTML = '<div class="gvi-section-label">💡 Ideas</div>';
    const pills = document.createElement('div');
    pills.className = 'shorts-pills';
    pool.forEach(s=>{
      const catMeta = GVI_CATEGORIES.find(c=>c.key===s.category);
      const p = document.createElement('div');
      p.className = 'shorts-pill'+(s.id===gviActiveId?' active':'');
      p.title = s.videoIdea;
      p.onclick=()=>{ gviActiveId=s.id; renderGeneralIdeasTab(); };
      const badge = document.createElement('span');
      badge.className = 'gvi-cat-badge gvi-cat-'+s.category;
      badge.textContent = catMeta ? catMeta.label.split(' ')[0] : s.category;
      const txt = document.createTextNode(' '+s.videoIdea.slice(0,36)+(s.videoIdea.length>36?'…':''));
      p.appendChild(badge);
      p.appendChild(txt);
      pills.appendChild(p);
    });
    ideaSec.appendChild(pills);
    wrap.appendChild(ideaSec);
  }

  // ── Active card ──
  if(active){
    const catMeta = GVI_CATEGORIES.find(c=>c.key===active.category);
    const card = document.createElement('div');
    card.className = 'shorts-card';

    const hdr = document.createElement('div');
    hdr.className = 'shorts-card-header';
    const ttl = document.createElement('div');
    ttl.className = 'shorts-card-title';
    ttl.innerHTML = (catMeta ? '<span class="gvi-cat-badge gvi-cat-'+active.category+'" style="margin-right:8px">'+catMeta.label+'</span>' : '')
      + active.videoIdea.slice(0,72)+(active.videoIdea.length>72?'…':'');
    hdr.appendChild(ttl);

    const useBtn = document.createElement('button');
    useBtn.className = 'shorts-btn-use'+(active.status==='use'?' already':'');
    useBtn.textContent = active.status==='use' ? '✅ In Use' : '✓ Use';
    useBtn.onclick = ()=>{
      const st2 = getGVIState();
      const idea = st2.ideas.find(s=>s.id===active.id);
      if(idea) idea.status = idea.status==='use'?'idea':'use';
      saveGVIState(st2);
      renderGeneralIdeasTab();
    };
    const discardBtn = document.createElement('button');
    discardBtn.className = 'shorts-btn-discard';
    discardBtn.textContent = '✕ Discard';
    discardBtn.onclick = ()=>{
      if(!confirm('Discard this idea?')) return;
      const st2 = getGVIState();
      const idea = st2.ideas.find(s=>s.id===active.id);
      if(idea) idea.status='discarded';
      saveGVIState(st2);
      gviActiveId=null;
      renderGeneralIdeasTab();
    };
    hdr.appendChild(useBtn);
    hdr.appendChild(discardBtn);
    card.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'shorts-card-body';

    function gviField(labelText, badgeHtml, tagName, value, fieldKey, placeholder, rows){
      const f = document.createElement('div');
      f.className = 'shorts-field';
      const lbl = document.createElement('div');
      lbl.className = 'shorts-field-label';
      lbl.innerHTML = labelText + (badgeHtml||'');
      f.appendChild(lbl);
      let el;
      if(tagName==='textarea'){ el=document.createElement('textarea'); el.rows=rows||3; }
      else { el=document.createElement('input'); el.type='text'; }
      el.value = value;
      el.placeholder = placeholder||'';
      el.oninput = ()=>{
        const st2 = getGVIState();
        const idea = st2.ideas.find(s=>s.id===active.id);
        if(idea){ idea[fieldKey]=el.value; saveGVIState(st2); }
      };
      f.appendChild(el);
      return f;
    }

    function badge(txt,cls){ return `<span class="shorts-platform ${cls}">${txt}</span>`; }
    const all3 = badge('TikTok','tiktok')+badge('IG Reels','ig')+badge('YT Shorts','yt');

    body.appendChild(gviField('VIDEO IDEA', badge('All platforms','all'), 'textarea', active.videoIdea, 'videoIdea', 'What is this video about?', 2));
    body.appendChild(gviField('TOPICS COVERED', badge('All platforms','all'), 'textarea', active.topics, 'topics', '• Topic 1\n• Topic 2', 3));
    body.appendChild(gviField('VIDEO OUTLINE', badge('All platforms','all'), 'textarea', active.outline, 'outline', '[0:00] Hook…', 5));

    // Titles
    const titlesField = document.createElement('div');
    titlesField.className = 'shorts-field';
    const titlesLbl = document.createElement('div');
    titlesLbl.className = 'shorts-field-label';
    titlesLbl.innerHTML = 'TITLE SUGGESTIONS <span style="color:var(--muted);font-size:9px;font-weight:400;letter-spacing:0;text-transform:none">click to copy</span>' + all3;
    titlesField.appendChild(titlesLbl);
    const titlesWrap = document.createElement('div');
    titlesWrap.className = 'shorts-titles';
    active.titles.forEach((t,ti)=>{
      const row = document.createElement('div');
      row.className = 'shorts-title-opt';
      const inp = document.createElement('input');
      inp.type='text'; inp.className='shorts-title-text'; inp.value=t;
      inp.oninput=()=>{
        const st2=getGVIState();
        const idea=st2.ideas.find(s=>s.id===active.id);
        if(idea){ idea.titles[ti]=inp.value; saveGVIState(st2); }
      };
      const cpBtn = document.createElement('button');
      cpBtn.className='shorts-copy-btn'; cpBtn.textContent='Copy';
      cpBtn.onclick=()=>{ navigator.clipboard.writeText(inp.value).then(()=>{ cpBtn.textContent='Copied!'; cpBtn.classList.add('copied'); setTimeout(()=>{ cpBtn.textContent='Copy'; cpBtn.classList.remove('copied'); },1800); }); };
      row.appendChild(inp); row.appendChild(cpBtn);
      titlesWrap.appendChild(row);
    });
    titlesField.appendChild(titlesWrap);
    body.appendChild(titlesField);

    body.appendChild(gviField('HEADER / ONSCREEN TEXT', badge('IG Reels','ig')+badge('TikTok','tiktok'), 'input', active.headerText, 'headerText', 'Short punchy ALL CAPS line…'));
    body.appendChild(gviField('DESCRIPTION', all3, 'textarea', active.description, 'description', 'Caption…', 4));
    body.appendChild(gviField('TAGS / HASHTAGS', all3, 'input', active.tags, 'tags', '#NBA #ManzaHoops…'));

    card.appendChild(body);
    wrap.appendChild(card);
  }

  c.innerHTML=''; c.appendChild(wrap); c.scrollTop=0;
}

// ── Sidebar pinned button handlers ──────────────────────────────────────────
document.getElementById('pinBtnBlank').onclick = () => {
  document.querySelectorAll('.sidebar-pin-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pinBtnBlank').classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  currentTab = 'blank';
  document.querySelector('.tabs').style.display = 'none';
  document.getElementById('title').textContent = 'Blank Teleprompter';
  document.getElementById('meta').innerHTML = '';
  renderTab();
};

document.getElementById('pinBtnGeneral').onclick = () => {
  document.querySelectorAll('.sidebar-pin-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pinBtnGeneral').classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  currentTab = 'general-ideas';
  document.querySelector('.tabs').style.display = 'none';
  document.getElementById('title').textContent = 'General Video Ideas';
  document.getElementById('meta').innerHTML = '<span style="color:var(--muted);font-size:12px">Not tied to a brief · saved locally</span>';
  renderTab();
};

// ── Migrate legacy GVI outlines (timestamp format → structured format) ──────
function migrateGVIIdeas(){
  const state = getGVIState();
  if(!state) return;
  let changed = false;
  state.ideas.forEach(idea => {
    if(idea.outline && /\[0:0\d/.test(idea.outline)){
      const pool = GVI_TEMPLATES[idea.category] || [];
      const tpl = pool.find(t => t.angle === idea.videoIdea) || { angle: idea.videoIdea, extra: '' };
      idea.outline = buildGVIOutline(tpl, idea.category, idea.videoIdea);
      changed = true;
    }
  });
  if(changed) saveGVIState(state);
}
migrateGVIIdeas();

// ═══════════════════════════════════════════════════════

loadList();
</script>
